server {
    listen 80;
    server_name mentallog.cde.jp;

    # Laravel の公開ディレクトリ（build ステージで焼き込み済み・Vite 資産含む）
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # 本番 compose のサービス名 "php" の php-fpm へ
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # 隠しファイルへのアクセス拒否（.env 等）
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log  /var/log/nginx/mentallog_error.log;
    access_log /var/log/nginx/mentallog_access.log;
}

; MentalLog PHP 設定（開発向け）
memory_limit = 512M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 120
date.timezone = Asia/Tokyo

; 開発時はエラーを表示
display_errors = On
error_reporting = E_ALL

; OPcache（開発では都度検証）
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
